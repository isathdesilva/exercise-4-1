<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.1 – SVG House</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
    nav { background: #1a1a2e; padding: 12px 24px; display: flex; gap: 16px; align-items: center; }
    nav a { color: #e0e0e0; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 4px; }
    nav a:hover, nav a.active { background: #4a90d9; color: white; }
    nav .title { color: white; font-weight: bold; margin-right: 16px; }
    main { max-width: 960px; margin: 40px auto; padding: 0 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #1a1a2e; }
    p.desc { color: #666; margin-bottom: 24px; line-height: 1.6; }
    .svg-container { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; justify-content: center; }
    svg { border: 1px solid #e0e0e0; border-radius: 8px; }
    .annotation { font-size: 11px; fill: #888; font-style: italic; }
    .coord-label { font-size: 10px; fill: #c0392b; font-family: monospace; }
  </style>
</head>
<body>
  <nav>
    <span class="title">COS30045</span>
    <a href="../index.html">Home</a>
    <a href="index.html" class="active">Ex 4.1 SVG House</a>
    <a href="bar.html">Ex 4.3–4.6 Bar Chart</a>
    <a href="../ex5/index.html">Ex 5 Multi-chart</a>
    <a href="../ex6/index.html">Ex 6 Interactivity</a>
  </nav>
  <main>
    <h1>Exercise 4.1 – SVG House &amp; Garden</h1>
    <p class="desc">
      An SVG house and garden demonstrating: <strong>shapes</strong> (rect, circle, ellipse, line),
      <strong>paths</strong>, <strong>text</strong>, <strong>grouping &amp; transforms</strong>, and <strong>styling</strong>.
      Coordinate annotations shown in red.
    </p>
    <div class="svg-container">
      <svg width="700" height="500" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">

        <!-- Sky gradient background -->
        <defs>
          <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#87CEEB"/>
            <stop offset="100%" stop-color="#e0f7ff"/>
          </linearGradient>
          <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5cb85c"/>
            <stop offset="100%" stop-color="#3a7a3a"/>
          </linearGradient>
        </defs>

        <!-- Background sky – RECTANGLE -->
        <rect x="0" y="0" width="700" height="500" fill="url(#skyGrad)"/>
        <text x="4" y="14" class="coord-label">(0,0)</text>

        <!-- Ground / Grass – RECTANGLE -->
        <rect x="0" y="380" width="700" height="120" fill="url(#grassGrad)"/>
        <text x="4" y="375" class="coord-label">(0,380)</text>

        <!-- Sun – CIRCLE -->
        <circle cx="620" cy="60" r="40" fill="#FFD700" stroke="#FFA500" stroke-width="3"/>
        <text x="620" y="110" text-anchor="middle" class="coord-label">cx=620,cy=60,r=40</text>
        <!-- Sun rays – LINES -->
        <line x1="620" y1="12" x2="620" y2="2"  stroke="#FFA500" stroke-width="2"/>
        <line x1="620" y1="108" x2="620" y2="118" stroke="#FFA500" stroke-width="2"/>
        <line x1="572" y1="60" x2="562" y2="60"  stroke="#FFA500" stroke-width="2"/>
        <line x1="668" y1="60" x2="678" y2="60"  stroke="#FFA500" stroke-width="2"/>
        <line x1="586" y1="26" x2="580" y2="20"  stroke="#FFA500" stroke-width="2"/>
        <line x1="654" y1="94" x2="660" y2="100" stroke="#FFA500" stroke-width="2"/>
        <line x1="654" y1="26" x2="660" y2="20"  stroke="#FFA500" stroke-width="2"/>
        <line x1="586" y1="94" x2="580" y2="100" stroke="#FFA500" stroke-width="2"/>

        <!-- Cloud – ELLIPSES grouped -->
        <g transform="translate(80, 70)" id="cloud">
          <ellipse cx="40" cy="20" rx="40" ry="20" fill="white" opacity="0.9"/>
          <ellipse cx="70" cy="15" rx="30" ry="18" fill="white" opacity="0.9"/>
          <ellipse cx="20" cy="18" rx="25" ry="15" fill="white" opacity="0.9"/>
          <ellipse cx="55" cy="25" rx="35" ry="16" fill="white" opacity="0.9"/>
          <text x="0" y="48" class="annotation">cloud group, transform="translate(80,70)"</text>
        </g>

        <!-- === HOUSE GROUP === -->
        <g transform="translate(200, 150)" id="house">

          <!-- House body – RECTANGLE -->
          <rect x="0" y="120" width="220" height="160" fill="#f5deb3" stroke="#8B6914" stroke-width="2.5"/>
          <text x="2" y="118" class="coord-label">(200,270)</text>

          <!-- Roof – PATH (triangle) -->
          <path d="M -20,120 L 110,10 L 240,120 Z" fill="#c0392b" stroke="#922b21" stroke-width="2.5"/>
          <text x="90" y="8" text-anchor="middle" class="coord-label">(310,160)</text>
          <text x="90" y="60" text-anchor="middle" class="annotation">PATH: M -20,120 L 110,10 L 240,120 Z</text>

          <!-- Chimney – RECT -->
          <rect x="150" y="-20" width="30" height="60" fill="#7f8c8d" stroke="#5d6d7e" stroke-width="1.5"/>
          <!-- Chimney smoke – PATH curve -->
          <path d="M 155,−20 Q 140,−50 160,−70 Q 180,−90 165,−110" 
                fill="none" stroke="#bdc3c7" stroke-width="3" stroke-dasharray="4,3" opacity="0.7"/>

          <!-- Front Door – RECT + PATH arch -->
          <rect x="80" y="200" width="60" height="80" fill="#8B4513" stroke="#5a2d0c" stroke-width="1.5"/>
          <path d="M 80,200 Q 110,170 140,200" fill="#8B4513" stroke="#5a2d0c" stroke-width="1.5"/>
          <!-- Door knob – CIRCLE -->
          <circle cx="130" cy="245" r="5" fill="#FFD700"/>

          <!-- Windows -->
          <!-- Left window frame – RECT -->
          <rect x="15" y="160" width="55" height="55" fill="#aed6f1" stroke="#2980b9" stroke-width="2"/>
          <line x1="42" y1="160" x2="42" y2="215" stroke="#2980b9" stroke-width="1.5"/>
          <line x1="15" y1="187" x2="70" y2="187" stroke="#2980b9" stroke-width="1.5"/>
          <!-- Right window -->
          <rect x="150" y="160" width="55" height="55" fill="#aed6f1" stroke="#2980b9" stroke-width="2"/>
          <line x1="177" y1="160" x2="177" y2="215" stroke="#2980b9" stroke-width="1.5"/>
          <line x1="150" y1="187" x2="205" y2="187" stroke="#2980b9" stroke-width="1.5"/>

          <!-- House label – TEXT -->
          <text x="110" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#5a2d0c" font-style="italic">My House</text>
        </g>

        <!-- === PATH: curved garden path === -->
        <path d="M 310,380 Q 280,350 310,310 Q 340,270 310,380" fill="none" stroke="transparent"/>
        <!-- Pathway stones -->
        <path d="M 270,380 Q 300,370 330,380" fill="#d5d8dc" stroke="#aab7b8" stroke-width="1"/>
        <ellipse cx="300" cy="395" rx="22" ry="8" fill="#d5d8dc" stroke="#aab7b8" stroke-width="1"/>
        <ellipse cx="300" cy="415" rx="20" ry="8" fill="#d5d8dc" stroke="#aab7b8" stroke-width="1"/>
        <ellipse cx="300" cy="435" rx="22" ry="8" fill="#d5d8dc" stroke="#aab7b8" stroke-width="1"/>
        <text x="330" y="415" class="annotation">PATH: garden walkway</text>

        <!-- === TREE GROUP (transform + grouping) === -->
        <g transform="translate(540, 200)" id="tree">
          <!-- trunk -->
          <rect x="-12" y="80" width="24" height="100" fill="#795548"/>
          <!-- foliage layers - ELLIPSES -->
          <ellipse cx="0" cy="90" rx="50" ry="35" fill="#2ecc71"/>
          <ellipse cx="0" cy="60" rx="40" ry="30" fill="#27ae60"/>
          <ellipse cx="0" cy="32" rx="28" ry="24" fill="#1e8449"/>
          <text x="0" y="185" text-anchor="middle" class="annotation">group id="tree"</text>
          <text x="0" y="197" text-anchor="middle" class="annotation">translate(540,200)</text>
        </g>

        <!-- Flowers – CIRCLES + LINES -->
        <g id="flowers">
          <g transform="translate(460, 350)">
            <line x1="0" y1="0" x2="0" y2="30" stroke="#27ae60" stroke-width="2"/>
            <circle cx="0" cy="0"  r="7" fill="#e74c3c"/>
            <circle cx="-7" cy="-4" r="5" fill="#c0392b"/>
            <circle cx="7"  cy="-4" r="5" fill="#c0392b"/>
            <circle cx="0"  cy="-10" r="5" fill="#c0392b"/>
          </g>
          <g transform="translate(480, 360)">
            <line x1="0" y1="0" x2="0" y2="20" stroke="#27ae60" stroke-width="2"/>
            <circle cx="0" cy="0" r="6" fill="#f39c12"/>
            <circle cx="-6" cy="-3" r="4" fill="#e67e22"/>
            <circle cx="6"  cy="-3" r="4" fill="#e67e22"/>
          </g>
          <g transform="translate(500, 355)">
            <line x1="0" y1="0" x2="0" y2="25" stroke="#27ae60" stroke-width="2"/>
            <circle cx="0" cy="0" r="7" fill="#9b59b6"/>
            <circle cx="-7" cy="-4" r="5" fill="#8e44ad"/>
            <circle cx="7"  cy="-4" r="5" fill="#8e44ad"/>
            <circle cx="0" cy="-10" r="5" fill="#8e44ad"/>
          </g>
          <text x="480" y="400" text-anchor="middle" class="annotation">CIRCLE + LINE = flowers</text>
        </g>

        <!-- Fence posts – LINES + RECTS -->
        <g id="fence">
          <rect x="140" y="340" width="8" height="50" fill="#d4a76a" stroke="#b8854a" stroke-width="1" rx="2"/>
          <rect x="160" y="340" width="8" height="50" fill="#d4a76a" stroke="#b8854a" stroke-width="1" rx="2"/>
          <rect x="180" y="340" width="8" height="50" fill="#d4a76a" stroke="#b8854a" stroke-width="1" rx="2"/>
          <rect x="200" y="340" width="8" height="50" fill="#d4a76a" stroke="#b8854a" stroke-width="1" rx="2"/>
          <line x1="138" y1="355" x2="210" y2="355" stroke="#b8854a" stroke-width="4"/>
          <line x1="138" y1="370" x2="210" y2="370" stroke="#b8854a" stroke-width="4"/>
          <text x="175" y="405" text-anchor="middle" class="annotation">RECT + LINE = fence</text>
        </g>

        <!-- Title text -->
        <text x="350" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2c3e50">
          COS30045 – Exercise 4.1: SVG House &amp; Garden
        </text>
      </svg>
    </div>
  </main>
</body>
</html>
