<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 4.1 – SVG House</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { margin-bottom: 10px; }
    p { margin-bottom: 20px; color: #555; }
    svg { border: 1px solid black; display: block; }
  </style>
</head>
<body>

  <h1>Exercise 4.1 – SVG House and Garden</h1>
  <p>
    A house and garden drawn using SVG shapes: rect, circle, ellipse, line, path, text.
    Windows are grouped using &lt;g&gt; with a shared transform.
    Red labels show coordinate points for each shape.
  </p>

  <svg width="700" height="500" viewBox="0 0 700 500">

    <!-- Sky background — RECT -->
    <rect x="0" y="0" width="700" height="500" fill="#87CEEB"/>
    <text x="5" y="15" font-size="10" fill="red">(0,0)</text>

    <!-- Grass — RECT -->
    <rect x="0" y="380" width="700" height="120" fill="#5cb85c"/>
    <text x="5" y="375" font-size="10" fill="red">(0,380)</text>

    <!-- Sun — CIRCLE -->
    <circle cx="620" cy="60" r="40" fill="#FFD700"/>
    <text x="580" y="112" font-size="10" fill="red">cx=620 cy=60 r=40</text>

    <!-- Sun rays — LINES -->
    <line x1="620" y1="10" x2="620" y2="0"  stroke="orange" stroke-width="2"/>
    <line x1="620" y1="110" x2="620" y2="120" stroke="orange" stroke-width="2"/>
    <line x1="570" y1="60" x2="560" y2="60"  stroke="orange" stroke-width="2"/>
    <line x1="670" y1="60" x2="680" y2="60"  stroke="orange" stroke-width="2"/>

    <!-- Cloud — ELLIPSES -->
    <ellipse cx="120" cy="80" rx="50" ry="22" fill="white"/>
    <ellipse cx="155" cy="68" rx="35" ry="20" fill="white"/>
    <ellipse cx="90"  cy="75" rx="30" ry="18" fill="white"/>
    <text x="70" y="110" font-size="10" fill="red">ellipse cloud</text>

    <!-- House body — RECT -->
    <rect x="200" y="240" width="220" height="160" fill="#f5deb3" stroke="#8B6914" stroke-width="2"/>
    <text x="202" y="238" font-size="10" fill="red">(200,240)</text>

    <!-- Roof — PATH -->
    <path d="M 180,240 L 310,130 L 440,240 Z" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
    <text x="270" y="128" font-size="10" fill="red" text-anchor="middle">PATH roof</text>

    <!-- Chimney — RECT -->
    <rect x="360" y="150" width="28" height="60" fill="#7f8c8d"/>
    <text x="361" y="148" font-size="10" fill="red">(360,150)</text>

    <!-- Door — RECT -->
    <rect x="285" y="330" width="50" height="70" fill="#8B4513"/>
    <!-- Door arch — PATH -->
    <path d="M 285,330 Q 310,305 335,330" fill="#8B4513"/>
    <!-- Door knob — CIRCLE -->
    <circle cx="328" cy="368" r="4" fill="gold"/>

    <!-- Windows group — G with transform and shared styling -->
    <!-- Both windows share the same fill, stroke and stroke-width via group -->
    <g transform="translate(200, 240)" fill="#aed6f1" stroke="#2980b9" stroke-width="2">
      <!-- Left window -->
      <rect x="15" y="30" width="50" height="50"/>
      <line x1="40" y1="30" x2="40" y2="80" stroke="#2980b9" stroke-width="1.5"/>
      <line x1="15" y1="55" x2="65" y2="55" stroke="#2980b9" stroke-width="1.5"/>
      <!-- Right window -->
      <rect x="155" y="30" width="50" height="50"/>
      <line x1="180" y1="30" x2="180" y2="80" stroke="#2980b9" stroke-width="1.5"/>
      <line x1="155" y1="55" x2="205" y2="55" stroke="#2980b9" stroke-width="1.5"/>
    </g>
    <text x="202" y="285" font-size="10" fill="red">g transform="translate(200,240)"</text>

    <!-- House label — TEXT -->
    <text x="310" y="420" text-anchor="middle" font-size="14" fill="#5a2d0c" font-style="italic">House</text>

    <!-- Tree trunk — RECT -->
    <rect x="515" y="300" width="20" height="80" fill="#795548"/>
    <!-- Tree foliage — ELLIPSES -->
    <ellipse cx="525" cy="290" rx="45" ry="30" fill="#2ecc71"/>
    <ellipse cx="525" cy="265" rx="35" ry="25" fill="#27ae60"/>
    <ellipse cx="525" cy="245" rx="25" ry="20" fill="#1e8449"/>

    <!-- Garden path — PATH -->
    <path d="M 310,380 Q 310,420 310,500" fill="none" stroke="#d5d8dc" stroke-width="18"/>
    <text x="320" y="420" font-size="10" fill="red">PATH garden path</text>

    <!-- Fence — RECTS + LINES -->
    <rect x="140" y="345" width="8" height="40" fill="#d4a76a"/>
    <rect x="158" y="345" width="8" height="40" fill="#d4a76a"/>
    <rect x="176" y="345" width="8" height="40" fill="#d4a76a"/>
    <line x1="138" y1="358" x2="186" y2="358" stroke="#b8854a" stroke-width="4"/>

  </svg>

</body>
</html>
